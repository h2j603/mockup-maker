<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mockup Maker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #0f0f0f;
  --panel:  #161616;
  --panel2: #1e1e1e;
  --border: rgba(255,255,255,0.07);
  --bh:     rgba(255,255,255,0.14);
  --text:   rgba(255,255,255,0.85);
  --muted:  rgba(255,255,255,0.3);
  --accent: #6366f1;
  --acc-h:  #818cf8;
  --font:   'Pretendard', -apple-system, sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);
  height:100dvh;display:flex;flex-direction:column;overflow:hidden;font-size:13px}

/* ── Header ── */
header{height:48px;padding:0 18px;display:flex;align-items:center;
  justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0}
.logo{font-size:13px;font-weight:600;letter-spacing:.05em}
.logo em{color:var(--accent);font-style:normal}
.tagline{font-size:11px;color:var(--muted)}

/* ── Layout ── */
#workspace{display:flex;flex:1;overflow:hidden}

/* ── Sidebar ── */
aside{width:240px;flex-shrink:0;border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden}
.sidebar-scroll{flex:1;overflow-y:auto;padding:14px 12px;
  display:flex;flex-direction:column;gap:0}
.sidebar-scroll::-webkit-scrollbar{width:3px}
.sidebar-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}

/* Section */
.sec{border-bottom:1px solid var(--border)}
.sec-hd{display:flex;align-items:center;justify-content:space-between;
  padding:10px 4px;cursor:pointer;user-select:none;
  font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);
  transition:color .15s}
.sec-hd:hover{color:var(--text)}
.sec-hd .arr{font-size:10px;transition:transform .2s}
.sec-hd.open .arr{transform:rotate(180deg)}
.sec-body{padding:0 4px 14px;display:flex;flex-direction:column;gap:10px}

/* Field */
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:10.5px;font-weight:500;color:var(--muted)}
.field-row{display:flex;align-items:center;gap:8px}

/* Pill buttons */
.pills{display:flex;gap:4px;flex-wrap:wrap}
.pill{padding:4px 10px;background:var(--panel2);border:1px solid var(--border);
  border-radius:20px;font-family:var(--font);font-size:11px;color:var(--muted);
  cursor:pointer;transition:all .15s}
.pill:hover{border-color:var(--bh);color:var(--text)}
.pill.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* Input */
input[type=range]{width:100%;accent-color:var(--accent);cursor:pointer}
input[type=color]{width:36px;height:28px;border:1px solid var(--border);
  border-radius:5px;background:var(--panel2);padding:2px;cursor:pointer}
input[type=number]{width:60px;padding:4px 6px;background:var(--panel2);
  border:1px solid var(--border);border-radius:5px;font-family:var(--font);
  font-size:12px;color:var(--text);text-align:center}
.val{font-size:11px;color:var(--muted);min-width:28px;text-align:right}

/* Tab panel */
.tab-panel{display:none}
.tab-panel.active{display:flex;flex-direction:column;gap:10px}

/* Drop zone */
.dz{border:1px dashed rgba(255,255,255,.12);border-radius:8px;
  padding:14px 10px;display:flex;flex-direction:column;align-items:center;gap:6px;
  cursor:pointer;text-align:center;transition:border-color .2s,background .2s;
  background:rgba(255,255,255,.015)}
.dz:hover,.dz.over{border-color:var(--accent);background:rgba(99,102,241,.06)}
.dz.done{border-style:solid;border-color:rgba(99,102,241,.4)}
.dz .dz-ic{font-size:18px;opacity:.4}
.dz .dz-lb{font-size:11px;color:var(--muted);line-height:1.5}
.dz .dz-nm{font-size:10px;color:var(--accent);font-weight:500;word-break:break-all;display:none}

/* Screen status */
.screen-ok {font-size:10.5px;color:#4ade80;padding:6px 8px;background:rgba(74,222,128,.07);
  border-radius:6px;display:none}
.screen-err{font-size:10.5px;color:#f87171;padding:6px 8px;background:rgba(248,113,113,.07);
  border-radius:6px;display:none}

/* Platform grid */
.plat-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.plat-btn{padding:7px 4px;background:var(--panel2);border:1px solid var(--border);
  border-radius:7px;cursor:pointer;display:flex;flex-direction:column;
  align-items:center;gap:3px;font-family:var(--font);color:var(--muted);transition:all .15s}
.plat-btn:hover{border-color:var(--bh);color:var(--text)}
.plat-btn.active{border-color:var(--accent);background:rgba(99,102,241,.1);color:var(--text)}
.plat-btn .pi{font-size:14px}
.plat-btn .pl{font-size:9.5px;letter-spacing:.02em}
.plat-btn .pr{font-size:8.5px;color:var(--muted)}

/* Export button */
#export-btn{width:100%;padding:10px;background:var(--accent);color:#fff;
  border:none;border-radius:7px;font-size:13px;font-weight:600;font-family:var(--font);
  cursor:pointer;letter-spacing:.02em;transition:background .2s}
#export-btn:hover:not(:disabled){background:var(--acc-h)}
#export-btn:disabled{opacity:.35;cursor:not-allowed}
#export-btn.rec{background:#ef4444;animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.6}}

/* Progress */
#progress-wrap{display:none;flex-direction:column;gap:5px}
#progress-bar-track{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
#progress-bar{height:100%;background:var(--accent);width:0%;transition:width .1s}
#progress-label{font-size:10px;color:var(--muted)}
.hint{font-size:10px;color:var(--muted);line-height:1.55;text-align:center}

/* ── Preview ── */
#preview-area{flex:1;display:flex;align-items:center;justify-content:center;
  overflow:hidden;position:relative;background:var(--bg)}
#canvas-wrap{position:relative;cursor:default}
#main-canvas{display:block;cursor:crosshair}
#ui-canvas{position:absolute;top:0;left:0;pointer-events:none}

.empty-msg{position:absolute;text-align:center;pointer-events:none;
  display:flex;flex-direction:column;align-items:center;gap:8px}
.empty-msg .ei{font-size:36px;opacity:.1}
.empty-msg .et{font-size:12px;color:var(--muted)}
</style>
</head>
<body>

<header>
  <div class="logo">Mockup <em>Maker</em></div>
  <div class="tagline">프레임 PNG + 영상 합성 → MP4 내보내기</div>
</header>

<div id="workspace">
<aside>
<div class="sidebar-scroll">

<!-- ① 프레임 -->
<div class="sec" id="sec-frame">
  <div class="sec-hd open" onclick="toggleSec(this)">프레임 <span class="arr">▾</span></div>
  <div class="sec-body">
    <!-- 모드 전환 -->
    <div class="pills" id="frame-mode-pills">
      <button class="pill active" onclick="setFrameMode('frame',this)">프레임 사용</button>
      <button class="pill"        onclick="setFrameMode('noframe',this)">프레임 없음</button>
    </div>

    <!-- 프레임 있음 -->
    <div id="fm-frame">
      <!-- 현재 사용 중인 프레임 목록 -->
      <div id="frame-list" style="display:none;flex-wrap:wrap;gap:6px;margin-bottom:8px"></div>
      <!-- 프리셋 썸네일 -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:6px" id="preset-grid"></div>
      <!-- 직접 업로드 (프레임 추가) -->
      <div class="dz" id="frame-dz" style="padding:10px">
        <div class="dz-ic" style="font-size:15px">＋</div>
        <div class="dz-lb" style="font-size:10.5px">직접 업로드 (PNG)</div>
        <div class="dz-nm" id="frame-nm"></div>
      </div>
      <input type="file" id="frame-fi" accept="image/png" style="display:none">
      <div class="screen-ok"  id="screen-ok"></div>
      <div class="screen-err" id="screen-err"></div>
    </div>

    <!-- 프레임 없음 -->
    <div id="fm-noframe" style="display:none">
      <div class="field">
        <label>모서리 반경</label>
        <div class="field-row">
          <input type="range" id="no-radius" min="0" max="200" value="0"
            oninput="T.noFrameRadius=+this.value;document.getElementById('no-radius-val').textContent=this.value+'px'">
          <span class="val" id="no-radius-val">0px</span>
        </div>
      </div>
      <div class="field">
        <label>화면 종횡비</label>
        <div class="pills" id="ratio-pills">
          <button class="pill active" data-ratio="video" onclick="setNoFrameRatio('video',this)">영상 비율</button>
          <button class="pill" data-ratio="9:16"  onclick="setNoFrameRatio('9:16',this)">9:16</button>
          <button class="pill" data-ratio="16:9"  onclick="setNoFrameRatio('16:9',this)">16:9</button>
          <button class="pill" data-ratio="1:1"   onclick="setNoFrameRatio('1:1',this)">1:1</button>
          <button class="pill" data-ratio="4:5"   onclick="setNoFrameRatio('4:5',this)">4:5</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ② 영상 -->
<div class="sec" id="sec-vid">
  <div class="sec-hd open" onclick="toggleSec(this)">영상 <span class="arr">▾</span></div>
  <div class="sec-body">
    <div class="dz" id="vid-dz">
      <div class="dz-ic">🎬</div>
      <div class="dz-lb">클릭하거나 드래그</div>
      <div class="dz-nm" id="vid-nm"></div>
    </div>
    <input type="file" id="vid-fi" accept="video/*" style="display:none">
  </div>
</div>

<!-- ③ 크기·위치 -->
<div class="sec" id="sec-size">
  <div class="sec-hd open" onclick="toggleSec(this)">크기 · 위치 <span class="arr">▾</span></div>
  <div class="sec-body">
    <div class="field">
      <label>프레임 크기</label>
      <div class="field-row">
        <input type="range" id="frame-scale" min="10" max="150" value="80"
          oninput="if(af())af().scale=+this.value/100;document.getElementById('frame-scale-val').textContent=this.value+'%'">
        <span class="val" id="frame-scale-val">80%</span>
      </div>
    </div>
    <div class="field">
      <label>영상 크기 (스크린 내)</label>
      <div class="field-row">
        <input type="range" id="vid-scale" min="50" max="200" value="100"
          oninput="T.vidScale=+this.value/100;document.getElementById('vid-scale-val').textContent=this.value+'%'">
        <span class="val" id="vid-scale-val">100%</span>
      </div>
    </div>
    <div class="field">
      <label>영상 오프셋 X</label>
      <div class="field-row">
        <input type="range" id="vid-ox" min="-100" max="100" value="0"
          oninput="T.vidOx=+this.value;document.getElementById('vid-ox-val').textContent=this.value">
        <span class="val" id="vid-ox-val">0</span>
      </div>
    </div>
    <div class="field">
      <label>영상 오프셋 Y</label>
      <div class="field-row">
        <input type="range" id="vid-oy" min="-100" max="100" value="0"
          oninput="T.vidOy=+this.value;document.getElementById('vid-oy-val').textContent=this.value">
        <span class="val" id="vid-oy-val">0</span>
      </div>
    </div>
    <button class="pill" style="width:100%;justify-content:center" onclick="resetTransform()">위치 초기화</button>
  </div>
</div>

<!-- ③-b 프레임 반사광 -->
<div class="sec" id="sec-blend">
  <div class="sec-hd open" onclick="toggleSec(this)">반사광 보정 <span class="arr">▾</span></div>
  <div class="sec-body">
    <div class="field">
      <label>블렌드 모드</label>
      <div class="pills" style="flex-wrap:wrap">
        <button class="pill active" data-blend="source-over" onclick="setBlend('source-over',this)">기본</button>
        <button class="pill" data-blend="screen"      onclick="setBlend('screen',this)">Screen</button>
        <button class="pill" data-blend="multiply"    onclick="setBlend('multiply',this)">Multiply</button>
        <button class="pill" data-blend="overlay"     onclick="setBlend('overlay',this)">Overlay</button>
        <button class="pill" data-blend="soft-light"  onclick="setBlend('soft-light',this)">Soft Light</button>
      </div>
      <span style="font-size:9.5px;color:var(--muted);margin-top:2px;display:block">
        반사광 어색할 땐 <strong style="color:rgba(255,255,255,.55)">Screen</strong> 추천
      </span>
    </div>
    <div class="field">
      <label>프레임 불투명도</label>
      <div class="field-row">
        <input type="range" id="frame-opacity" min="10" max="100" value="100"
          oninput="if(af())af().opacity=+this.value/100;document.getElementById('frame-opacity-val').textContent=this.value+'%'">
        <span class="val" id="frame-opacity-val">100%</span>
      </div>
    </div>
    <div class="field">
      <label>글로우</label>
      <div class="field-row" style="gap:8px">
        <input type="color" id="glow-color" value="#ffffff"
          style="width:32px;height:28px;border:none;background:none;cursor:pointer;padding:0;border-radius:4px"
          oninput="if(af())af().glowColor=this.value">
        <input type="range" id="glow-size" min="0" max="120" value="0" style="flex:1"
          oninput="if(af())af().glowSize=+this.value;document.getElementById('glow-size-val').textContent=this.value+'px'">
        <span class="val" id="glow-size-val">0px</span>
      </div>
    </div>
  </div>
</div>

<!-- ④ 배경 -->
<div class="sec" id="sec-bg">
  <div class="sec-hd open" onclick="toggleSec(this)">배경 <span class="arr">▾</span></div>
  <div class="sec-body">
    <div class="pills" id="bg-pills">
      <button class="pill active" data-bg="gradient" onclick="switchBg('gradient',this)">그라디언트</button>
      <button class="pill" data-bg="solid"    onclick="switchBg('solid',this)">단색</button>
      <button class="pill" data-bg="image"    onclick="switchBg('image',this)">이미지</button>
      <button class="pill" data-bg="bgvideo"  onclick="switchBg('bgvideo',this)">동영상</button>
    </div>

    <!-- 그라디언트 -->
    <div class="tab-panel active" id="bp-gradient">
      <div class="field-row">
        <input type="color" id="gc1" value="#0d0d1a" oninput="updateBg()">
        <input type="color" id="gc2" value="#1a0533" oninput="updateBg()">
      </div>
      <div class="field">
        <label>각도</label>
        <div class="field-row">
          <input type="range" id="gangle" min="0" max="360" value="135" oninput="document.getElementById('gangle-v').textContent=this.value+'°';updateBg()">
          <span class="val" id="gangle-v">135°</span>
        </div>
      </div>
    </div>

    <!-- 단색 -->
    <div class="tab-panel" id="bp-solid">
      <div class="field">
        <label>색상</label>
        <div class="field-row">
          <input type="color" id="solid-c" value="#0a0a12" oninput="updateBg()">
          <span class="val" id="solid-hex">#0a0a12</span>
        </div>
      </div>
    </div>

    <!-- 이미지 -->
    <div class="tab-panel" id="bp-image">
      <div class="dz" id="bgimg-dz">
        <div class="dz-lb">배경 이미지 업로드</div>
      </div>
      <input type="file" id="bgimg-fi" accept="image/*" style="display:none">
      <div class="field">
        <label>맞춤</label>
        <div class="pills" id="bgimg-fit-pills">
          <button class="pill active" data-fit="cover"   onclick="setBgFit('cover',this)">꽉 채우기</button>
          <button class="pill" data-fit="contain" onclick="setBgFit('contain',this)">전체 보기</button>
          <button class="pill" data-fit="stretch" onclick="setBgFit('stretch',this)">늘이기</button>
        </div>
      </div>
    </div>

    <!-- 배경 동영상 -->
    <div class="tab-panel" id="bp-bgvideo">
      <div class="dz" id="bgvid-dz">
        <div class="dz-lb">배경 동영상 업로드</div>
      </div>
      <input type="file" id="bgvid-fi" accept="video/*" style="display:none">
    </div>
  </div>
</div>

<!-- ⑤ 플랫폼 -->
<div class="sec" id="sec-plat">
  <div class="sec-hd open" onclick="toggleSec(this)">플랫폼 <span class="arr">▾</span></div>
  <div class="sec-body">
    <div class="plat-grid" id="plat-grid">
      <button class="plat-btn active" data-plat="ig-story">
        <span class="pi">📱</span><span class="pl">스토리</span><span class="pr">1080×1920</span>
      </button>
      <button class="plat-btn" data-plat="ig-feed">
        <span class="pi">⬜</span><span class="pl">피드 1:1</span><span class="pr">1080×1080</span>
      </button>
      <button class="plat-btn" data-plat="ig-port">
        <span class="pi">📷</span><span class="pl">피드 4:5</span><span class="pr">1080×1350</span>
      </button>
      <button class="plat-btn" data-plat="tiktok">
        <span class="pi">🎵</span><span class="pl">TikTok</span><span class="pr">1080×1920</span>
      </button>
      <button class="plat-btn" data-plat="youtube">
        <span class="pi">▶</span><span class="pl">YouTube</span><span class="pr">1920×1080</span>
      </button>
      <button class="plat-btn" data-plat="twitter">
        <span class="pi">✕</span><span class="pl">X / Twitter</span><span class="pr">1920×1080</span>
      </button>
    </div>
  </div>
</div>

<!-- ⑥ 내보내기 -->
<div class="sec" id="sec-export">
  <div class="sec-hd open" onclick="toggleSec(this)">내보내기 <span class="arr">▾</span></div>
  <div class="sec-body">
    <div class="field">
      <label>화질</label>
      <div class="pills" id="q-pills">
        <button class="pill" data-q="medium" onclick="setQ('medium',this)">8 Mbps</button>
        <button class="pill active" data-q="high" onclick="setQ('high',this)">25 Mbps</button>
        <button class="pill" data-q="ultra" onclick="setQ('ultra',this)">60 Mbps</button>
      </div>
    </div>
    <div class="field">
      <label>FPS</label>
      <div class="pills" id="fps-pills">
        <button class="pill" data-fps="24" onclick="setFps(24,this)">24</button>
        <button class="pill active" data-fps="30" onclick="setFps(30,this)">30</button>
        <button class="pill" data-fps="60" onclick="setFps(60,this)">60</button>
      </div>
    </div>
    <button id="export-btn" onclick="doExport()" disabled>내보내기</button>
    <div id="progress-wrap">
      <div id="progress-bar-track"><div id="progress-bar"></div></div>
      <div id="progress-label">준비 중...</div>
    </div>
    <div class="hint" id="export-hint">프레임과 영상을 업로드하세요</div>
  </div>
</div>

</div><!-- sidebar-scroll -->
</aside>

<main id="preview-area">
  <div class="empty-msg" id="empty-msg">
    <div class="ei">📱</div>
    <div class="et">프레임 PNG와 영상을 업로드하면<br>미리보기가 표시됩니다</div>
  </div>
  <div id="canvas-wrap" style="display:none">
    <canvas id="main-canvas"></canvas>
    <canvas id="ui-canvas"></canvas>
  </div>
</main>
</div>

<!-- Source video (hidden) -->
<video id="src-video" style="display:none" loop muted playsinline crossorigin="anonymous"></video>

<script>
// ═══════════════════════════════════════════════════
// State
// ═══════════════════════════════════════════════════
const PLATFORMS = {
  'ig-story': {w:1080,h:1920},
  'ig-feed':  {w:1080,h:1080},
  'ig-port':  {w:1080,h:1350},
  'tiktok':   {w:1080,h:1920},
  'youtube':  {w:1920,h:1080},
  'twitter':  {w:1920,h:1080},
};
const Q = { medium:8_000_000, high:25_000_000, ultra:60_000_000 };

const T = {   // transform state
  vidScale: 1.0,
  vidOx: 0,   // % offset
  vidOy: 0,
  noFrame: false,
  noFrameRadius: 0,
  noFrameRatio: 'video', // 'video' | '9:16' | '16:9' | '1:1' | '4:5'
  // 프레임 없음 모드 전용 위치/크기
  noFrameScale: 0.80,
  noFrameCx: 0.5,
  noFrameCy: 0.5,
};

const BG = {
  type: 'gradient',
  gc1: '#0d0d1a', gc2: '#1a0533', angle: 135,
  solidColor: '#0a0a12',
  img: null, imgFit: 'cover', imgFitColor: '#000',
  bgVid: null,
};

// 다중 프레임 상태
let frames = [];
let activeIdx = 0;

function af() { return frames[activeIdx] || null; }

function newFrame(img, screenArea, name) {
  return {
    img, screenArea, name,
    cx: 0.5, cy: 0.5, scale: 0.80,
    blend: 'source-over', opacity: 1.0,
    glowColor: '#ffffff', glowSize: 0,
  };
}

let videoEl   = document.getElementById('src-video');
let vidLoaded = false;

let platform = 'ig-story';
let quality  = 'high';
let fps      = 30;

let rafId = null;

// Canvas refs
const mainCanvas = document.getElementById('main-canvas');
const uiCanvas   = document.getElementById('ui-canvas');
const mCtx       = mainCanvas.getContext('2d');
const uCtx       = uiCanvas.getContext('2d');

// Preview display scale (canvas CSS size vs internal)
let pixelScale = 1; // canvas.width / canvas.clientWidth (for mouse coord mapping)

// ═══════════════════════════════════════════════════
// Section toggle
// ═══════════════════════════════════════════════════
function toggleSec(hd) {
  hd.classList.toggle('open');
  const body = hd.nextElementSibling;
  body.style.display = hd.classList.contains('open') ? '' : 'none';
}

// ═══════════════════════════════════════════════════
// Canvas setup
// ═══════════════════════════════════════════════════
function setupCanvas(plat) {
  const {w, h} = PLATFORMS[plat];
  const area = document.getElementById('preview-area');
  const aW = area.clientWidth  - 40;
  const aH = area.clientHeight - 40;
  const s = Math.min(aW / w, aH / h);

  const cssW = Math.round(w * s);
  const cssH = Math.round(h * s);

  [mainCanvas, uiCanvas].forEach(c => {
    c.width  = w;
    c.height = h;
    c.style.width  = cssW + 'px';
    c.style.height = cssH + 'px';
  });

  uiCanvas.style.pointerEvents = 'auto';
  pixelScale = w / cssW;
}

// ═══════════════════════════════════════════════════
// Background
// ═══════════════════════════════════════════════════
function drawBg(ctx, w, h) {
  if (BG.type === 'gradient') {
    const a = BG.angle * Math.PI / 180;
    const cx = w/2, cy = h/2, r = Math.sqrt(cx*cx+cy*cy);
    const g = ctx.createLinearGradient(cx-Math.cos(a)*r, cy-Math.sin(a)*r,
                                        cx+Math.cos(a)*r, cy+Math.sin(a)*r);
    g.addColorStop(0, BG.gc1);
    g.addColorStop(1, BG.gc2);
    ctx.fillStyle = g; ctx.fillRect(0,0,w,h);
  } else if (BG.type === 'solid') {
    ctx.fillStyle = BG.solidColor; ctx.fillRect(0,0,w,h);
  } else if (BG.type === 'image' && BG.img) {
    drawMediaFit(ctx, BG.img, w, h, BG.imgFit, BG.imgFitColor);
  } else if (BG.type === 'bgvideo' && BG.bgVid && BG.bgVid.readyState >= 2) {
    drawMediaFit(ctx, BG.bgVid, w, h, 'cover', '#000');
  } else {
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,w,h);
  }
}

function drawMediaFit(ctx, media, cw, ch, fit, bgColor) {
  const mw = media.naturalWidth || media.videoWidth || 1;
  const mh = media.naturalHeight || media.videoHeight || 1;
  const mr = mw/mh, cr = cw/ch;
  let dx, dy, dw, dh;
  if (fit === 'cover') {
    if (mr > cr) { dh=ch; dw=ch*mr; dx=(cw-dw)/2; dy=0; }
    else         { dw=cw; dh=cw/mr; dx=0; dy=(ch-dh)/2; }
  } else if (fit === 'contain') {
    ctx.fillStyle = bgColor||'#000'; ctx.fillRect(0,0,cw,ch);
    if (mr > cr) { dw=cw; dh=cw/mr; dx=0; dy=(ch-dh)/2; }
    else         { dh=ch; dw=ch*mr; dx=(cw-dw)/2; dy=0; }
  } else { // stretch
    dx=0; dy=0; dw=cw; dh=ch;
  }
  ctx.drawImage(media, dx, dy, dw, dh);
}

// ═══════════════════════════════════════════════════
// Composite draw
// ═══════════════════════════════════════════════════
function getFrameRect(fr, cw, ch) {
  if (!fr || !fr.img) return null;
  const iw = fr.img.naturalWidth, ih = fr.img.naturalHeight;
  const s  = (Math.min(cw, ch) * fr.scale) / Math.max(iw, ih);
  const fw = iw * s, fh = ih * s;
  const fx = fr.cx * cw - fw/2;
  const fy = fr.cy * ch - fh/2;
  return {fx, fy, fw, fh, s};
}

function getScreenRect(fr, rect) {
  if (!fr || !fr.screenArea || !rect) return null;
  const {fx, fy, s} = rect;
  return {
    sx: fx + fr.screenArea.x * s,
    sy: fy + fr.screenArea.y * s,
    sw: fr.screenArea.w * s,
    sh: fr.screenArea.h * s,
  };
}

function drawComposite(ctx, cw, ch) {
  // 1. 배경
  drawBg(ctx, cw, ch);

  // ── 프레임 없음 모드 ──────────────────────────
  if (T.noFrame) {
    if (!vidLoaded) return;
    const {fx, fy, fw, fh} = getNoFrameRect(cw, ch);
    const r = T.noFrameRadius;
    ctx.save();
    ctx.beginPath();
    ctx.roundRect ? ctx.roundRect(fx, fy, fw, fh, r) : ctx.rect(fx, fy, fw, fh);
    ctx.clip();
    const vs = T.vidScale;
    const dw = fw*vs, dh = fh*vs;
    const ox = T.vidOx/100*fw, oy = T.vidOy/100*fh;
    const dx = fx+(fw-dw)/2+ox, dy = fy+(fh-dh)/2+oy;
    if (videoEl.readyState >= 2) drawVideoCover(ctx, videoEl, dx, dy, dw, dh);
    else { ctx.fillStyle='#111'; ctx.fillRect(fx,fy,fw,fh); }
    ctx.restore();
    return;
  }

  if (frames.length === 0) return;

  // 2. 각 프레임의 스크린 영역에 영상 그리기
  const PAD = 2;
  for (const fr of frames) {
    const rect = getFrameRect(fr, cw, ch);
    const sr = getScreenRect(fr, rect);
    if (!sr) continue;
    const {sx, sy, sw, sh} = sr;
    const cx2 = sx-PAD, cy2 = sy-PAD, cw2 = sw+PAD*2, ch2 = sh+PAD*2;
    const vs = T.vidScale;
    const dw = sw*vs, dh = sh*vs;
    const ox = T.vidOx/100*sw, oy = T.vidOy/100*sh;
    const dx = sx+(sw-dw)/2+ox, dy = sy+(sh-dh)/2+oy;
    ctx.save();
    ctx.rect(cx2, cy2, cw2, ch2);
    ctx.clip();
    if (vidLoaded && videoEl.readyState >= 2) drawVideoCover(ctx, videoEl, dx, dy, dw, dh);
    else { ctx.fillStyle='#111'; ctx.fillRect(cx2,cy2,cw2,ch2); }
    ctx.restore();
  }

  // 3. 각 프레임 PNG를 위에 그리기
  for (const fr of frames) {
    const rect = getFrameRect(fr, cw, ch);
    if (!rect) continue;
    ctx.save();
    ctx.globalCompositeOperation = fr.blend;
    ctx.globalAlpha = fr.opacity;
    if (fr.glowSize > 0) {
      ctx.shadowColor = fr.glowColor;
      ctx.shadowBlur = fr.glowSize;
    }
    ctx.drawImage(fr.img, rect.fx, rect.fy, rect.fw, rect.fh);
    ctx.restore();
  }
}

// 프레임 없음 모드용 rect 계산
function getNoFrameRect(cw, ch) {
  const vid = videoEl;
  let ar;
  if (T.noFrameRatio === 'video' && vid.videoWidth && vid.videoHeight) {
    ar = vid.videoWidth / vid.videoHeight;
  } else {
    const map = {'9:16':9/16,'16:9':16/9,'1:1':1,'4:5':4/5};
    ar = map[T.noFrameRatio] || 9/16;
  }
  const maxW = cw * T.noFrameScale;
  const maxH = ch * T.noFrameScale;
  let fw, fh;
  if (maxW / maxH > ar) { fh = maxH; fw = fh * ar; }
  else { fw = maxW; fh = fw / ar; }
  const fx = T.noFrameCx * cw - fw/2;
  const fy = T.noFrameCy * ch - fh/2;
  return {fx, fy, fw, fh};
}

function drawVideoCover(ctx, vid, x, y, w, h) {
  const vw = vid.videoWidth, vh = vid.videoHeight;
  if (!vw||!vh) return;
  const vr = vw/vh, sr = w/h;
  let sx, sy, sw, sh;
  if (vr > sr) { sh=vh; sw=vh*sr; sx=(vw-sw)/2; sy=0; }
  else         { sw=vw; sh=vw/sr; sx=0; sy=(vh-sh)/2; }
  ctx.drawImage(vid, sx, sy, sw, sh, x, y, w, h);
}

// ═══════════════════════════════════════════════════
// UI canvas (handles)
// ═══════════════════════════════════════════════════
const HANDLE_R = 8;

function drawHandles() {
  const cw = uiCanvas.width, ch = uiCanvas.height;
  uCtx.clearRect(0, 0, cw, ch);
  if (T.noFrame || frames.length === 0) return;
  const fr = af();
  if (!fr) return;
  const rect = getFrameRect(fr, cw, ch);
  if (!rect) return;
  const {fx, fy, fw, fh} = rect;

  // 프레임 테두리
  uCtx.strokeStyle = 'rgba(99,102,241,0.5)';
  uCtx.lineWidth = 1.5;
  uCtx.setLineDash([6,4]);
  uCtx.strokeRect(fx, fy, fw, fh);
  uCtx.setLineDash([]);

  // 코너 핸들
  const corners = [{x:fx,y:fy},{x:fx+fw,y:fy},{x:fx,y:fy+fh},{x:fx+fw,y:fy+fh}];
  corners.forEach(({x,y}) => {
    uCtx.fillStyle = '#fff';
    uCtx.strokeStyle = '#6366f1';
    uCtx.lineWidth = 2;
    uCtx.beginPath(); uCtx.arc(x, y, HANDLE_R, 0, Math.PI*2);
    uCtx.fill(); uCtx.stroke();
  });
}

// ═══════════════════════════════════════════════════
// Render loop
// ═══════════════════════════════════════════════════
function render() {
  const cw = mainCanvas.width, ch = mainCanvas.height;
  drawComposite(mCtx, cw, ch);
  drawHandles();
  rafId = requestAnimationFrame(render);
}

// ═══════════════════════════════════════════════════
// Drag / resize interaction
// ═══════════════════════════════════════════════════
let drag = null; // { mode: 'move'|'resize', startMx, startMy, startCx, startCy, startScale, corner }

uiCanvas.addEventListener('mousedown', e => {
  if (!af() || T.noFrame) return;
  const {mx, my} = toCanvas(e);
  const cw = uiCanvas.width, ch = uiCanvas.height;
  const rect = getFrameRect(af(), cw, ch);
  if (!rect) return;
  const {fx, fy, fw, fh} = rect;

  // 코너 핸들 먼저 확인
  const corners = [{x:fx,y:fy},{x:fx+fw,y:fy},{x:fx,y:fy+fh},{x:fx+fw,y:fy+fh}];
  for (const c of corners) {
    if (Math.hypot(mx-c.x, my-c.y) < HANDLE_R+4) {
      drag = {mode:'resize', startMx:mx, startMy:my,
              startScale:af().scale, corner:c,
              startCx:af().cx, startCy:af().cy};
      return;
    }
  }

  // 프레임 내부 확인
  if (mx >= fx && mx <= fx+fw && my >= fy && my <= fy+fh) {
    drag = {mode:'move', startMx:mx, startMy:my,
            startCx:af().cx, startCy:af().cy};
    uiCanvas.style.cursor = 'grabbing';
  }
});

uiCanvas.addEventListener('mousemove', e => {
  if (!drag) {
    // 커서 업데이트
    if (!af() || T.noFrame) return;
    const {mx, my} = toCanvas(e);
    const cw = uiCanvas.width, ch = uiCanvas.height;
    const rect = getFrameRect(af(), cw, ch);
    if (!rect) return;
    const {fx, fy, fw, fh} = rect;
    const corners = [{x:fx,y:fy},{x:fx+fw,y:fy},{x:fx,y:fy+fh},{x:fx+fw,y:fy+fh}];
    let onHandle = corners.some(c => Math.hypot(mx-c.x, my-c.y) < HANDLE_R+4);
    let inFrame  = mx>=fx && mx<=fx+fw && my>=fy && my<=fy+fh;
    uiCanvas.style.cursor = onHandle ? 'nwse-resize' : inFrame ? 'grab' : 'default';
    return;
  }

  const {mx, my} = toCanvas(e);
  const cw = uiCanvas.width, ch = uiCanvas.height;
  const dx = mx - drag.startMx, dy = my - drag.startMy;

  if (drag.mode === 'move') {
    af().cx = drag.startCx + dx/cw;
    af().cy = drag.startCy + dy/ch;
  } else if (drag.mode === 'resize') {
    // 프레임 중심으로부터의 거리로 스케일 조정
    const frameCx = af().cx * cw, frameCy = af().cy * ch;
    const dist = Math.hypot(mx - frameCx, my - frameCy);
    const startDist = Math.hypot(drag.corner.x - frameCx, drag.corner.y - frameCy);
    if (startDist > 0) {
      af().scale = Math.max(0.1, Math.min(2, drag.startScale * dist/startDist));
      document.getElementById('frame-scale').value = Math.round(af().scale*100);
      document.getElementById('frame-scale-val').textContent = Math.round(af().scale*100)+'%';
    }
  }
});

['mouseup','mouseleave'].forEach(ev =>
  uiCanvas.addEventListener(ev, () => { drag=null; uiCanvas.style.cursor='default'; })
);

function toCanvas(e) {
  const rect = uiCanvas.getBoundingClientRect();
  return {
    mx: (e.clientX - rect.left) * pixelScale,
    my: (e.clientY - rect.top)  * pixelScale,
  };
}

// ═══════════════════════════════════════════════════
// Screen detection
// ═══════════════════════════════════════════════════
function detectScreen(img) {
  const origW = img.naturalWidth, origH = img.naturalHeight;

  // 최대 600px 다운샘플 — 속도 확보
  const MAX = 600;
  const scale = Math.min(1, MAX / Math.max(origW, origH));
  const w = Math.round(origW * scale), h = Math.round(origH * scale);

  const tmp = Object.assign(document.createElement('canvas'), { width: w, height: h });
  const tc = tmp.getContext('2d');
  tc.drawImage(img, 0, 0, w, h);
  const px = tc.getImageData(0, 0, w, h).data;

  const THRESH = 30;
  const isTrans = i => px[i * 4 + 3] < THRESH;
  const idx = (x, y) => y * w + x;

  // ① 외곽에서 BFS → 배경 투명 픽셀에 visited 마킹
  const visited = new Uint8Array(w * h);
  const queue = [];

  const enqueue = (x, y) => {
    const i = idx(x, y);
    if (visited[i] || !isTrans(i)) return;
    visited[i] = 1;
    queue.push(i);
  };

  for (let x = 0; x < w; x++) { enqueue(x, 0); enqueue(x, h - 1); }
  for (let y = 1; y < h - 1; y++) { enqueue(0, y); enqueue(w - 1, y); }

  let qi = 0;
  while (qi < queue.length) {
    const i = queue[qi++];
    const x = i % w, y = (i / w) | 0;
    if (x > 0)     enqueue(x - 1, y);
    if (x < w - 1) enqueue(x + 1, y);
    if (y > 0)     enqueue(x, y - 1);
    if (y < h - 1) enqueue(x, y + 1);
  }

  // ② 방문 안 된 투명 픽셀 = 디바이스 내부 스크린 구멍
  let minX = w, maxX = 0, minY = h, maxY = 0, found = false;

  for (let i = 0; i < w * h; i++) {
    if (!visited[i] && isTrans(i)) {
      const x = i % w, y = (i / w) | 0;
      if (x < minX) minX = x;
      if (x > maxX) maxX = x;
      if (y < minY) minY = y;
      if (y > maxY) maxY = y;
      found = true;
    }
  }

  if (!found || maxX - minX < 5 || maxY - minY < 5) return null;

  // 원본 해상도로 역산
  return {
    x: Math.round(minX / scale),
    y: Math.round(minY / scale),
    w: Math.round((maxX - minX) / scale),
    h: Math.round((maxY - minY) / scale),
  };
}

// ═══════════════════════════════════════════════════
// File loaders
// ═══════════════════════════════════════════════════
// ── 다중 프레임 헬퍼 ──────────────────────────────
function addFrame(img, screenArea, name) {
  frames.push(newFrame(img, screenArea, name));
  activeIdx = frames.length - 1;
  renderFrameList();
  syncSlidersToActiveFrame();
  showCanvas();
  checkReady();
}

function updateScreenStatus() {
  const fr = af();
  const ok = document.getElementById('screen-ok');
  const err = document.getElementById('screen-err');
  if (!fr) { ok.style.display='none'; err.style.display='none'; return; }
  if (fr.screenArea) {
    ok.textContent = `✓ 스크린 감지 (${fr.screenArea.w}×${fr.screenArea.h}px)`;
    ok.style.display = 'block'; err.style.display = 'none';
  } else {
    err.textContent = '⚠ 투명 스크린 없음';
    err.style.display = 'block'; ok.style.display = 'none';
  }
}

function syncSlidersToActiveFrame() {
  const fr = af();
  if (!fr) return;
  document.getElementById('frame-scale').value = Math.round(fr.scale*100);
  document.getElementById('frame-scale-val').textContent = Math.round(fr.scale*100)+'%';
  document.getElementById('frame-opacity').value = Math.round(fr.opacity*100);
  document.getElementById('frame-opacity-val').textContent = Math.round(fr.opacity*100)+'%';
  document.getElementById('glow-color').value = fr.glowColor;
  document.getElementById('glow-size').value = fr.glowSize;
  document.getElementById('glow-size-val').textContent = fr.glowSize+'px';
  document.querySelectorAll('[data-blend]').forEach(b =>
    b.classList.toggle('active', b.dataset.blend === fr.blend));
}

function setActiveFrame(idx) {
  activeIdx = idx;
  renderFrameList();
  syncSlidersToActiveFrame();
  updateScreenStatus();
}

function removeFrame(idx) {
  frames.splice(idx, 1);
  if (activeIdx >= frames.length) activeIdx = Math.max(0, frames.length - 1);
  renderFrameList();
  syncSlidersToActiveFrame();
  updateScreenStatus();
  checkReady();
}

function renderFrameList() {
  const list = document.getElementById('frame-list');
  list.innerHTML = '';
  if (frames.length === 0) {
    list.style.display = 'none';
    return;
  }
  list.style.display = 'flex';
  frames.forEach((fr, i) => {
    const item = document.createElement('div');
    item.style.cssText = `position:relative;cursor:pointer;border-radius:6px;overflow:visible;
      border:2px solid ${i===activeIdx?'var(--accent)':'rgba(255,255,255,0.1)'};
      background:#1a1a1a;flex-shrink:0;width:52px;height:52px;transition:border-color .15s`;
    item.title = fr.name;
    item.addEventListener('click', () => setActiveFrame(i));

    const thumb = document.createElement('img');
    thumb.src = fr.img.src;
    thumb.style.cssText = 'width:100%;height:100%;object-fit:contain;display:block;padding:3px';
    item.appendChild(thumb);

    const del = document.createElement('button');
    del.textContent = '×';
    del.style.cssText = `position:absolute;top:-6px;right:-6px;width:16px;height:16px;
      border-radius:50%;border:none;background:#444;color:#fff;font-size:10px;
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      line-height:1;padding:0;z-index:1`;
    del.addEventListener('click', e => { e.stopPropagation(); removeFrame(i); });
    item.appendChild(del);

    list.appendChild(item);
  });
}

function loadFrame(file) {
  if (!file || !file.type.includes('png')) { alert('투명 스크린이 있는 PNG 파일을 올려주세요'); return; }
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    const scr = detectScreen(img);
    addFrame(img, (scr && scr.w > 10 && scr.h > 10) ? scr : null, file.name);
    updateScreenStatus();
    updateDz('frame-dz', 'frame-nm', file.name);
  };
  img.src = url;
}

function loadVideo(file) {
  if (!file || !file.type.startsWith('video/')) return;
  videoEl.src = URL.createObjectURL(file);
  videoEl.loop = true; videoEl.muted = true; videoEl.play();
  vidLoaded = true;
  updateDz('vid-dz', 'vid-nm', file.name);
  showCanvas();
  checkReady();
}

function updateDz(dzId, nmId, name) {
  const dz = document.getElementById(dzId);
  dz.classList.add('done');
  dz.querySelector('.dz-ic') && (dz.querySelector('.dz-ic').textContent = '✅');
  dz.querySelector('.dz-lb').textContent = '다른 파일로 교체';
  const nm = document.getElementById(nmId);
  nm.textContent = name; nm.style.display = 'block';
}

function showCanvas() {
  document.getElementById('empty-msg').style.display = 'none';
  document.getElementById('canvas-wrap').style.display = 'block';
}

function checkReady() {
  const hasFrame = frames.length > 0;
  const ready = T.noFrame ? vidLoaded : (hasFrame && vidLoaded);
  document.getElementById('export-btn').disabled = !ready;
  document.getElementById('export-hint').textContent = ready
    ? `${PLATFORMS[platform].w}×${PLATFORMS[platform].h} · ${fps}fps · ${Q[quality]/1e6|0}Mbps`
    : !vidLoaded ? '영상을 올려주세요'
    : !hasFrame  ? '프레임을 선택하거나 "프레임 없음"으로 변경하세요'
    : '스크린 투명 영역이 감지되지 않았어요';
}

// ── 프리셋 프레임 ─────────────────────────────────
const PRESET_FRAMES = [
  'image-from-rawpixel-id-2023077-original.png',
  'image-from-rawpixel-id-2780331-original.png',
  'image-from-rawpixel-id-2813176-original.png',
  'image-from-rawpixel-id-2839156-original.png',
];

function buildPresetGrid() {
  const grid = document.getElementById('preset-grid');
  PRESET_FRAMES.forEach((name, i) => {
    const wrap = document.createElement('div');
    wrap.style.cssText = 'position:relative;cursor:pointer;border-radius:6px;overflow:hidden;' +
      'border:2px solid transparent;transition:border-color .15s;background:#1a1a1a;aspect-ratio:1';
    wrap.dataset.idx = i;

    const img = document.createElement('img');
    img.src = `./frames/${name}`;
    img.style.cssText = 'width:100%;height:100%;object-fit:contain;display:block;padding:4px';
    img.loading = 'lazy';

    wrap.appendChild(img);
    wrap.addEventListener('click', () => loadPreset(name, wrap));
    grid.appendChild(wrap);
  });
}

function loadPreset(name, wrapEl) {
  const url = `./frames/${name}`;
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    const scr = detectScreen(img);
    addFrame(img, (scr && scr.w > 10 && scr.h > 10) ? scr : null, name);
    updateScreenStatus();
    // 선택 표시 (마지막 클릭된 프리셋 하이라이트)
    document.querySelectorAll('#preset-grid > div').forEach(d => d.style.borderColor='transparent');
    if (wrapEl) wrapEl.style.borderColor = 'var(--accent)';
  };
  img.src = url;
}

function bindDz(dzId, fiId, handler) {
  const dz = document.getElementById(dzId);
  const fi = document.getElementById(fiId);
  dz.addEventListener('click', () => fi.click());

  dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('over'); handler(e.dataTransfer.files[0]); });

// ═══════════════════════════════════════════════════
// Export (WebCodecs MP4 → WebM fallback)
// ═══════════════════════════════════════════════════
let isExporting = false;

async function doExport() {
  if (isExporting || (!T.noFrame && frames.length === 0) || !vidLoaded) return;

  // WebCodecs 지원 확인
  if (typeof VideoEncoder !== 'undefined') {
    await exportMP4();
  } else {
    await exportWebM();
  }
}

async function exportMP4() {
  const {w: EW, h: EH} = PLATFORMS[platform];
  const bitrate  = Q[quality];
  const frameMs  = 1000 / fps;
  const frameMicros = 1_000_000 / fps;
  const duration = videoEl.duration || 10;
  const totalFrames = Math.ceil(duration * fps);

  // 내보내기용 오프스크린 캔버스
  const ec  = Object.assign(document.createElement('canvas'), {width:EW, height:EH});
  const ectx = ec.getContext('2d');

  // mp4-muxer 동적 로드
  let Muxer, ABTarget;
  const cdns = [
    'https://cdn.jsdelivr.net/npm/mp4-muxer@4.1.3/+esm',
    'https://esm.sh/mp4-muxer@4.1.3',
    'https://cdn.skypack.dev/mp4-muxer@4.1.3',
  ];
  for (const cdn of cdns) {
    try {
      const mod = await import(cdn);
      Muxer = mod.Muxer; ABTarget = mod.ArrayBufferTarget;
      break;
    } catch(_) {}
  }
  if (!Muxer) { await exportWebM(); return; }

  // H.264 코덱 탐색
  const codecs = ['avc1.640034','avc1.4d0034','avc1.4d0032','avc1.42001f','avc1.42001e'];
  let codec = 'avc1.42001e';
  for (const c of codecs) {
    try {
      const r = await VideoEncoder.isConfigSupported({codec:c, width:EW, height:EH, bitrate});
      if (r.supported) { codec = c; break; }
    } catch(_) {}
  }

  startProgress();
  isExporting = true;

  try {
    const target  = new ABTarget();
    const muxer   = new Muxer({target, video:{codec:'avc',width:EW,height:EH}, fastStart:'in-memory'});
    let encErr = null;
    const encoder = new VideoEncoder({
      output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
      error:  (e) => { encErr = e; },
    });
    encoder.configure({codec, width:EW, height:EH, bitrate, framerate:fps});

    videoEl.currentTime = 0;
    videoEl.loop = false;
    await videoEl.play();

    for (let f = 0; f < totalFrames; f++) {
      if (encErr) throw encErr;
      drawComposite(ectx, EW, EH);
      const frame = new VideoFrame(ec, {timestamp: Math.round(f * frameMicros)});
      encoder.encode(frame, {keyFrame: f % (fps*2) === 0});
      frame.close();
      setProgress(f, totalFrames, 'MP4 인코딩 중...');
      await new Promise(r => setTimeout(r, frameMs));
    }

    await encoder.flush();
    muxer.finalize();

    const blob = new Blob([target.buffer], {type:'video/mp4'});
    downloadBlob(blob, `mockup-${platform}-${Date.now()}.mp4`);
    showToast('MP4 저장 완료 ✓');
  } catch(e) {
    console.error(e);
    await exportWebM();
  } finally {
    videoEl.loop = true; videoEl.play();
    stopProgress();
    isExporting = false;
  }
}

async function exportWebM() {
  const {w:EW, h:EH} = PLATFORMS[platform];
  const frameMs = 1000 / fps;
  const duration = videoEl.duration || 10;
  const totalFrames = Math.ceil(duration * fps);

  const ec   = Object.assign(document.createElement('canvas'), {width:EW, height:EH});
  const ectx = ec.getContext('2d');

  const candidates = [
    'video/mp4;codecs=avc1.42E01E','video/mp4;codecs=avc1','video/mp4',
    'video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm',
  ];
  const safeCheck = t => { try { return MediaRecorder.isTypeSupported(t); } catch{return false;} };
  const mime = candidates.find(safeCheck) || '';
  const ext  = mime.startsWith('video/mp4') ? 'mp4' : 'webm';

  startProgress();
  isExporting = true;

  const chunks = [];
  const stream = ec.captureStream(fps);
  let rec;
  try {
    rec = new MediaRecorder(stream, {mimeType:mime, videoBitsPerSecond:Q[quality]});
  } catch {
    rec = new MediaRecorder(stream);
  }
  rec.ondataavailable = e => { if(e.data?.size>0) chunks.push(e.data); };

  videoEl.currentTime = 0; videoEl.loop = false;
  await videoEl.play();
  rec.start(Math.round(frameMs));

  // 렌더 루프 (내보내기용)
  for (let f = 0; f < totalFrames; f++) {
    drawComposite(ectx, EW, EH);
    setProgress(f, totalFrames, `${ext.toUpperCase()} 녹화 중...`);
    await new Promise(r => setTimeout(r, frameMs));
  }

  rec.stop();
  await new Promise(res => { rec.addEventListener('stop', res, {once:true}); setTimeout(res, 3000); });

  const blob = new Blob(chunks, {type: rec.mimeType || mime || 'video/webm'});
  downloadBlob(blob, `mockup-${platform}-${Date.now()}.${ext}`);
  showToast(`${ext.toUpperCase()} 저장 완료 ✓`);

  videoEl.loop = true; videoEl.play();
  stopProgress();
  isExporting = false;
}

// ═══════════════════════════════════════════════════
// Progress UI
// ═══════════════════════════════════════════════════
function startProgress() {
  document.getElementById('export-btn').textContent = '내보내는 중...';
  document.getElementById('export-btn').disabled = true;
  document.getElementById('progress-wrap').style.display = 'flex';
  document.getElementById('progress-bar').style.width = '0%';
}
function setProgress(f, total, label) {
  const pct = Math.round(f/total*100);
  document.getElementById('progress-bar').style.width = pct+'%';
  document.getElementById('progress-label').textContent = `${label} ${f}/${total}`;
}
function stopProgress() {
  document.getElementById('export-btn').textContent = '내보내기';
  document.getElementById('export-btn').disabled = false;
  document.getElementById('progress-wrap').style.display = 'none';
  checkReady();
}

// ═══════════════════════════════════════════════════
// Helpers
// ═══════════════════════════════════════════════════
function downloadBlob(blob, name) {
  const url = URL.createObjectURL(blob);
  Object.assign(document.createElement('a'), {href:url, download:name}).click();
  setTimeout(() => URL.revokeObjectURL(url), 15000);
}

let toastTimer;
function showToast(msg) {
  clearTimeout(toastTimer);
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);' +
      'background:rgba(20,20,20,0.95);border:1px solid rgba(255,255,255,.12);' +
      'color:#fff;padding:10px 20px;border-radius:8px;font-family:Pretendard,sans-serif;' +
      'font-size:13px;z-index:9999;transition:opacity .3s;pointer-events:none';
    document.body.appendChild(t);
  }
  t.textContent = msg; t.style.opacity = '1';
  toastTimer = setTimeout(() => { t.style.opacity = '0'; }, 3000);
}

  v.loop = true; v.muted = true; v.playsInline = true; v.play();

  document.getElementById('bgvid-dz').innerHTML = `<div class="dz-lb">✅ ${file.name}</div>`;
  document.getElementById('bgvid-dz').classList.add('done');
  v.addEventListener('loadedmetadata', () => {}, {once:true});
});
